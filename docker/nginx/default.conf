# บล็อกสำหรับ HTTP (พอร์ต 80)
server {
    listen 80;
    server_name localhost;

    # จำกัดขนาดไฟล์อัปโหลดเป็น 20MB ตามเงื่อนไข Enterprise
    client_max_body_size 20M;

    # 1. เส้นทางไปฝั่ง Backend API (/api)
    location /api/ {
        proxy_pass http://sweettooth-backend:8000; # ส่งต่อไปตู้ Laravel
        proxy_http_version 1.1;
        
        # ส่งต่อ IP จริงและความปลอดภัยไปให้หลังบ้านรู้ตัวตนผู้ใช้
        proxy_set_header Host $Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. เส้นทางไปฝั่ง MinIO Storage (/storage)
    location /storage/ {
        proxy_pass http://sweettooth-minio:9000; # ส่งต่อไปตู้ MinIO
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. เส้นทางหลักเข้าหน้าเว็บทั่วไป (/) -> ส่งไปตู้ Next.js
    location / {
        proxy_pass http://sweettooth-frontend:3000; # ส่งต่อไปตู้ Next.js
        proxy_http_version 1.1;
        
        # ตั้งค่ารองรับ WebSockets (จำเป็นมากสำหรับ Next.js Hot Reload ในโหมด Dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}