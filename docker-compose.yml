services:
  db:
    image: postgres:15-alpine
    container_name: sweettooth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sweettooth}
      POSTGRES_USER: ${DB_USERNAME:-sweetuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    # ไม่เปิดพอร์ตมาตรฐาน 5432 ตรงๆ ป้องกันการชน แต่เปิดพอร์ต 5441 ให้ DBeaver เข้าได้
    ports:
      - "5441:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sweettooth-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev # ใช้ Dockerfile สำหรับ Dev
    container_name: sweettooth-backend
    restart: unless-stopped
    # ถ้ารันบนเครื่องตัวเอง (Dev) แนะนำเอา replicas: 3 ออกก่อนเพื่อให้เช็ค Log และ Debug ง่ายขึ้นครับ
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-sweettooth}
      DB_USERNAME: ${DB_USERNAME:-sweetuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    networks:
      - sweettooth-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev # ใช้ Dockerfile สำหรับ Dev
    container_name: sweettooth-frontend
    restart: unless-stopped
    # ผูก Volume เพื่อให้เซิร์ฟเวอร์ Next.js ตรวจจับโค้ดที่แก้แล้วทำ Hot Reload ได้
    volumes:
      - ./frontend:/app
      - /app/node_modules # บล็อกไม่ให้ node_modules เครื่องเราไปทับในตู้
    environment:
      - NEXT_PUBLIC_API_URL=http://192.168.1.162:8081/api  # 1️⃣ แก้ตรงนี้ให้เป็น IP VM
    extra_hosts:
      - "192.168.1.162:host-gateway"
    depends_on:
      - backend
    networks:
      - sweettooth-network

  nginx:
    image: nginx:alpine
    container_name: sweettooth-nginx
    restart: unless-stopped
    ports:
      - "8081:80"   # เปิดพอร์ตมาตรฐานให้โลกภายนอกเข้าผ่านทางนี้ทางเดียวพอ
      - "8443:443" # เผื่อทำ SSL ในอนาคต
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - sweettooth-network

  minio:
    image: minio/minio
    container_name: sweettooth-minio
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9003:9001" # เปิดไว้สำหรับเข้าหน้าเว็บการจัดการ MinIO Console
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sweettooth-network

networks:
  sweettooth-network:
    driver: bridge

volumes:
  pgdata:
  minio_data:
