version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sweettooth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sweettooth}
      POSTGRES_USER: ${DB_USERNAME:-sweetuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sweettooth-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sweettooth-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-sweettooth}
      DB_USERNAME: ${DB_USERNAME:-sweetuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    networks:
      - sweettooth-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sweettooth-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - sweettooth-network

networks:
  sweettooth-network:
    driver: bridge

volumes:
  pgdata:
