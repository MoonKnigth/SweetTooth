version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sweettooth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sweettooth}
      POSTGRES_USER: ${DB_USERNAME:-sweetuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sweettooth-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 3
    expose:
      - "8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-sweettooth}
      DB_USERNAME: ${DB_USERNAME:-sweetuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    networks:
      - sweettooth-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sweettooth-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - sweettooth-network

  nginx:
    image: nginx:alpine
    container_name: sweettooth-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - sweettooth-network

  minio:
    image: minio/minio
    container_name: sweettooth-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sweettooth-network

networks:
  sweettooth-network:
    driver: bridge

volumes:
  pgdata:
  minio_data:
